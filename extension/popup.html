<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: 'Courier New', monospace;
      background: #0f0f0f;
      color: #e5e5e5;
      padding: 16px;
    }
    .logo {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 14px;
    }
    .logo-icon { font-size: 20px; }
    .logo-text { font-size: 13px; font-weight: bold; color: #10b981; letter-spacing: 0.5px; }
    .status-row {
      display: flex; align-items: center; gap: 8px;
      background: #1a1a1a; border-radius: 6px; padding: 8px 10px;
      margin-bottom: 12px; gap: 8px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; flex-shrink: 0; }
    .dot.connected { background: #10b981; }
    .status-text { font-size: 11px; color: #999; }
    .btn {
      width: 100%; padding: 8px; border: none; border-radius: 6px;
      font-family: monospace; font-size: 12px; cursor: pointer;
      margin-bottom: 8px; transition: all 0.15s;
    }
    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-secondary { background: #1a1a1a; color: #10b981; border: 1px solid #10b981; }
    .btn-secondary:hover { background: #10b98120; }
    .shortcut {
      font-size: 10px; color: #555; text-align: center; margin-top: 4px;
    }
    .shortcut kbd {
      background: #222; color: #aaa; padding: 1px 4px; border-radius: 3px;
      font-family: monospace; font-size: 10px;
    }
    .divider { border: none; border-top: 1px solid #222; margin: 10px 0; }
    .open-viewer {
      width: 100%; padding: 8px; border: none; border-radius: 6px;
      background: #10b98120; color: #10b981; border: 1px solid #10b98140;
      font-family: monospace; font-size: 11px; cursor: pointer;
    }
    .open-viewer:hover { background: #10b98130; }
    .filter-section {
      background: #1a1a1a; border-radius: 6px; padding: 10px;
      margin-bottom: 10px; border: 1px solid #222;
    }
    .filter-label {
      font-size: 10px; color: #10b981; font-weight: bold;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
      display: block;
    }
    .filter-input {
      width: 100%; padding: 6px 8px; background: #0f0f0f; border: 1px solid #333;
      border-radius: 4px; color: #e5e5e5; font-family: monospace; font-size: 11px;
      outline: none;
    }
    .filter-input:focus { border-color: #10b981; }
    .filter-help {
      font-size: 9px; color: #555; margin-top: 4px; line-height: 1.3;
    }
    .filter-badge {
      display: inline-block; background: #10b98120; color: #10b981;
      border: 1px solid #10b98140; padding: 2px 6px; border-radius: 3px;
      font-size: 9px; margin-top: 6px;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 8px;
      font-size: 10px;
      color: #bbb;
    }
    .toggle-row input[type="checkbox"] {
      accent-color: #10b981;
      width: 14px;
      height: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="logo">
    <span class="logo-icon">🌿</span>
    <span class="logo-text">DOM TREE CAPTURE</span>
  </div>

  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span class="status-text" id="status-text">Checking server...</span>
  </div>

  <button class="btn btn-primary" id="snap-btn">📸 Capture Now</button>
  <div class="shortcut">or press <kbd>Ctrl+Shift+S</kbd></div>

  <button class="btn btn-secondary" id="toggle-capture-btn">⏸ Stop Capture</button>
  <div class="shortcut" id="capture-state-text">Auto capture is ON</div>

  <hr class="divider">

  <div class="filter-section">
    <label class="filter-label">🎯 Focus URLs (optional)</label>
    <input type="text" class="filter-input" id="focus-urls" placeholder="e.g., bynry.com or platform-new.bynry.com/service-orders">
    <div class="filter-help">
      Capture only matching browser URLs. Supports domain, path, query text, and * wildcard. Comma separated.
    </div>
    <button class="btn btn-secondary" id="preset-bynry-btn" style="margin-top:8px; margin-bottom:0; padding:6px; font-size:11px;">Use *.bynry.com/*</button>
    <div class="filter-badge" id="focus-status">No focus rules</div>
  </div>

  <div class="filter-section">
    <label class="filter-label">🚫 Ignore URLs (optional)</label>
    <input type="text" class="filter-input" id="ignore-urls" placeholder="e.g., logout, /health, *.svg">
    <div class="filter-help">
      Skip matching browser URLs. Ignore rules are applied before focus rules.
    </div>
    <div class="filter-badge" id="ignore-status">No ignore rules</div>
    <label class="toggle-row" for="ignore-chatclient">
      <span>Ignore chatclient.ai widget</span>
      <input type="checkbox" id="ignore-chatclient" checked>
    </label>
  </div>

  <button class="open-viewer" id="viewer-btn">🌐 Open Tree Viewer → localhost:7700</button>

  <script src="popup.js"></script>
</body>
</html>
